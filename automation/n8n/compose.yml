# STANDALONE FALLBACK ONLY. You ALREADY run n8n in your ai-stack as `ai-n8n`
# (~/.dotfiles/podman-compose/ai-stack.yaml — Mem0 + Langfuse + Phoenix + n8n,
# data volume podman-compose_n8ndata, workflows mount ~/.config/n8n/workflows).
# PRIMARY PATH: start that — `systemctl --user start ai-stack` — and import the
# workflows (already copied into ~/.config/n8n/workflows). Use THIS compose only
# if you ever want n8n standalone, off the ai mesh. Image pinned to the local
# docker.io copy (docker.n8n.io rate-limits unauthenticated pulls).
services:
  n8n:
    image: docker.io/n8nio/n8n:latest
    container_name: sl-n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"        # loopback only — reach it at http://localhost:5678
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - GENERIC_TIMEZONE=America/Los_Angeles
      - TZ=America/Los_Angeles
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_RUNNERS_ENABLED=true
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      # Encryption key pins your saved credentials across restarts (set in .env).
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
volumes:
  n8n_data:
