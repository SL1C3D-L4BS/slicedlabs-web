<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="SlicedLabs">
  <defs>
    <radialGradient id="bloomA" cx="30%" cy="22%" r="60%">
      <stop offset="0" stop-color="#D9583C" stop-opacity="0.20"/>
      <stop offset="0.7" stop-color="#D9583C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bloomB" cx="82%" cy="88%" r="62%">
      <stop offset="0" stop-color="#308BDB" stop-opacity="0.22"/>
      <stop offset="0.7" stop-color="#308BDB" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
    </filter>
  </defs>
  <!-- branded textured panel — a calm field, NOT a "coming soon" placard -->
  <rect width="1200" height="900" fill="#1F2024"/>
  <rect width="1200" height="900" fill="url(#bloomA)"/>
  <rect width="1200" height="900" fill="url(#bloomB)"/>
  <rect width="1200" height="900" filter="url(#grain)" opacity="0.5"/>
  <rect x="24" y="24" width="1152" height="852" rx="32" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>
  <!-- consume the operator-owned mark verbatim (never redrawn), faint + centered -->
  <image href="/slicedlabs-mark.svg" xlink:href="/slicedlabs-mark.svg" x="480" y="330" width="240" height="240" opacity="0.42"/>
</svg>
