# SlicedLabs design tokens — PRODUCT SSOT.
# src/build.ts generates dist/{tokens.css, p3.css, tokens.js} from this file.
# 2026-06-22: the WARM palette is now the LUXE ESPRESSO CREAM (unified with the desktop —
# the old "byte-identical cream" law is RETIRED). Both temperatures get reworked for luxury.
# (Mirrors the machine-wide ~/.dotfiles/system/tokens.toml; kept in sync, not relocated.)

[meta]
name = "SlicedLabs Liquid Retina"

# ── DARK / PREMIUM (default — company / build-in-public) ──────────────────────
# 2026 cinematic rework: deeper, faintly-cool base (more "Unreal" depth + lifts the
# brand accents over AA-normal), crisper liquid-glass rim, + a high-contrast
# --muted-strong for dense secondary text. Verified by src/contrast.ts.
[color.dark]
bg           = "#161619"
bg-alt       = "#1F2024"
ink          = "#F7F6F2"
muted        = "#B8A789"
muted-strong = "#D6C9AE"
panel        = "rgba(31, 32, 36, 0.82)"
stroke       = "rgba(255, 255, 255, 0.10)"
# softer top rim on dark glass (was 0.22 — the bright white edge made the navbar
# + tiles read "milky/strange" in dark). Warm keeps its own dark rim below.
rim          = "rgba(255, 255, 255, 0.14)"

# ── WARM / FOOD (truck · menu · consumer) — LUXE ESPRESSO CREAM ────────────────
# Deep café-crème, unified with the desktop (#DEC8B1). Darkened off the old white
# latte for a real espresso luxury; crisp near-black ink carries it (APCA ≥ 75).
[color.warm]
bg          = "#DEC8B1"   # espresso cream — the deep café-crème field
bg-alt      = "#D8C0A7"   # warm crema — raised surface
ink         = "#15110A"   # crisp espresso ink — solid headers + body (Lc 75.5 on the cream)
muted       = "#4F4434"   # deep taupe — secondary text (Lc 62)
muted-strong = "#3E3528"  # darker taupe — dense secondary text (Lc 68)
# espresso glass — warm crema over the deep cream (was milky white over near-white).
panel       = "rgba(222, 200, 177, 0.62)"
stroke      = "rgba(21, 17, 10, 0.12)"
rim         = "rgba(21, 17, 10, 0.14)"
glass-sheen = "0.04"

# ── the official mark gradients — sRGB base ───────────────────────────────────
[brand]
coral  = "#D9583C"
orange = "#CB6820"
teal   = "#2F9B80"
blue   = "#308BDB"
mark   = "#38B6FF"
brass  = "#B5894E"   # warm metallic gold — the luxe accent (hairlines · rules · accent words)

[blend]
value = "linear-gradient(100deg, var(--coral), var(--orange) 38%, var(--teal) 68%, var(--blue))"

# ── Display-P3 wide-gamut overrides (richer blend on Retina/P3) ────────────────
[brand_p3]
coral  = "color(display-p3 0.851 0.345 0.235)"
orange = "color(display-p3 0.796 0.408 0.125)"
teal   = "color(display-p3 0.184 0.608 0.502)"
blue   = "color(display-p3 0.188 0.545 0.859)"
mark   = "color(display-p3 0.298 0.714 1.000)"

[status]
ok     = "#C7D42B"
warn   = "#D9892B"
danger = "#D95C5C"

# ── section accents — the new platform destinations get their own hue (tile rims,
# icon tints, accent rules). Defined in :root and shared across both temperatures, like
# the brand accents. Used decoratively (never body text), so they ride the UI floor (3.0),
# not AA-normal. NOT logo/mark colors — those are operator-owned and never generated here.
[section]
freshsave = "#2FA56B"   # regenerative green — FreshSave / waste-as-mission
community = "#6C7BE8"    # warm indigo — community · outreach · sponsorship

[material]
# radius ladder (documented): 8 chips/fields-tight · 16 cards/fields · 28 showpiece · 999 pills.
radius-sm      = "8px"
radius         = "16px"
radius-lg      = "28px"
radius-pill    = "999px"
blur           = "20px"
gap            = "8px"
contrast-floor = "4.5"
maxw           = "72rem"

# ── spacing scale (4/8-based) — the one rhythm SSOT. Replaces the ad-hoc per-section
# padding-block/gap improvisations. --space-1..7 → 4/8/12/16/24/40/64. Used by .section,
# .stack, and component density. ────────────────────────────────────────────────────────
[space]
"space-1" = "0.25rem"   # 4
"space-2" = "0.5rem"    # 8
"space-3" = "0.75rem"   # 12
"space-4" = "1rem"      # 16
"space-5" = "1.5rem"    # 24
"space-6" = "2.5rem"    # 40 — default section rhythm
"space-7" = "4rem"      # 64 — large section rhythm

# ── elevation ladder — three shadow tiers so a list row never carries a hero's ambient
# shadow. 1 = resting card · 2 = raised/hover · 3 = floating panel/modal. ────────────────
[shadow]
"shadow-1" = "0 1px 2px rgba(0,0,0,.18), 0 2px 8px rgba(0,0,0,.12)"
"shadow-2" = "0 4px 12px rgba(0,0,0,.22), 0 12px 28px rgba(0,0,0,.18)"
"shadow-3" = "0 18px 50px rgba(0,0,0,.34), 0 40px 90px rgba(0,0,0,.28)"

[glass]
glass-tint  = "0.82"
glass-rim   = "0.18"
# dark specular sheen, softened (was 0.10). Warm overrides with its own 0.045 in
# [color.warm], so this value is dark-only. Lower = less white haze on dark glass.
glass-sheen = "0.06"
focal-rim   = "0.18"
ultra-rim   = "0.24"

[motion]
t-quick  = "120ms"
t-normal = "220ms"
t-slow   = "460ms"   # cinematic — more deliberate entrances/transitions (luxe upscale)
ease     = "cubic-bezier(0.2, 0.8, 0.2, 1.0)"

# 2026-06-23: DISPLAY = an editorial SERIF (Fraunces — variable, opsz/wght). The mono
# headline hard-capped the register at "dev tool"; the serif carries the food/craft warmth.
# Inter stays the body; Geist Mono is the eyebrow/label/number voice ONLY (.mono / .count).
[font]
display = '"Fraunces", Georgia, "Times New Roman", serif'
body    = '"Inter", system-ui, sans-serif'
mono    = '"Geist Mono", "JetBrains Mono", ui-monospace, monospace'

# ── fluid type scale — perfect-fifth feel, clamped ────────────────────────────
[scale]
"step--1" = "clamp(0.80rem, 0.77rem + 0.15vw, 0.89rem)"
"step-0"  = "clamp(1.00rem, 0.96rem + 0.20vw, 1.13rem)"
"step-1"  = "clamp(1.20rem, 1.10rem + 0.45vw, 1.50rem)"
"step-2"  = "clamp(1.50rem, 1.32rem + 0.85vw, 2.10rem)"
"step-3"  = "clamp(1.90rem, 1.58rem + 1.55vw, 2.95rem)"
"step-4"  = "clamp(2.40rem, 1.85rem + 2.65vw, 4.15rem)"
"step-5"  = "clamp(3.00rem, 2.00rem + 5.00vw, 6.00rem)"
